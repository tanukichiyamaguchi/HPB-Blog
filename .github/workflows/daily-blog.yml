name: Daily Blog Auto-Post (Production)

on:
  schedule:
    # Runs daily at 13:15 UTC == 22:15 JST. The Salon Board side will publish
    # the scheduled post at next-day 08:15 JST, so this leaves plenty of buffer.
    - cron: "15 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write  # needed to commit theme_history.json updates

concurrency:
  group: daily-blog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  post:
    name: Generate + Schedule post + Notify
    # Safety guard: scheduled triggers only fire when the repo-level variable
    # `ENABLE_DAILY_CRON` is set to "true" via Settings → Variables → Actions.
    # Manual workflow_dispatch always works.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      vars.ENABLE_DAILY_CRON == 'true'
    runs-on: ubuntu-latest
    # 3 posts/day (morning/noon/evening) ≈ 3× generation + 3× relay post.
    # Single-post pipeline takes ~3 min, so 3 slots safely fit under 40 min.
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -q

      - name: Run full pipeline
        id: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SALON_BOARD_ID: ${{ secrets.SALON_BOARD_ID }}
          SALON_BOARD_PASSWORD: ${{ secrets.SALON_BOARD_PASSWORD }}
          # お名前.com PHP relay (Japan IP) — required because Akamai on
          # salonboard.com silently drops POSTs from US-IP GitHub runners.
          # See relay/README.md for setup.
          RELAY_URL: ${{ secrets.RELAY_URL }}
          RELAY_SECRET: ${{ secrets.RELAY_SECRET }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # Optional overrides (Repo Variables)
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
          GEMINI_IMAGE_MODEL: ${{ vars.GEMINI_IMAGE_MODEL }}
          ANTHROPIC_TIMEOUT_SEC: ${{ vars.ANTHROPIC_TIMEOUT_SEC }}
          GEMINI_TIMEOUT_SEC: ${{ vars.GEMINI_TIMEOUT_SEC }}
          API_RETRY_ATTEMPTS: ${{ vars.API_RETRY_ATTEMPTS }}
          RUN_SALON_BOARD_POST: schedule
          UPDATE_THEME_HISTORY: "true"
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PYTHONUNBUFFERED: "1"
          # On any relay-side failure (login form re-shown, KPCL error, etc.)
          # the relay client dumps the failing HTML response here so we can
          # see exactly what Salon Board returned without rerunning.
          SALON_BOARD_DEBUG_DUMP_DIR: ${{ github.workspace }}/debug-dumps
        run: python -m src.main

      - name: Commit theme history
        if: success()
        run: |
          if [ -n "$(git status --porcelain data/theme_history.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/theme_history.json
            git commit -m "chore: append theme history ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes to theme_history.json"
          fi

      - name: Show debug dumps in log (on failure)
        if: failure()
        run: |
          set +e
          DIR="${{ github.workspace }}/debug-dumps"
          if [ ! -d "$DIR" ]; then
            echo "No debug-dumps directory"
            exit 0
          fi
          for f in "$DIR"/*.html "$DIR"/*.txt; do
            [ -e "$f" ] || continue
            echo ""
            echo "================================================================"
            echo "=== $f ($(wc -c < "$f") bytes)"
            echo "================================================================"
            cat "$f"
            echo ""
            echo "=== EOF $f ==="
          done

      - name: Upload artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: daily-blog-failure-${{ github.run_id }}
          path: |
            output/
            debug-dumps/
          if-no-files-found: warn
          retention-days: 14
