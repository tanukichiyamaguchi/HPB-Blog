name: Manual Test (AI Generation)

on:
  workflow_dispatch:
    inputs:
      log_level:
        description: "Log level"
        required: false
        default: "INFO"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING

permissions:
  contents: read

jobs:
  generate:
    name: Generate blog (theme + body + image)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests (no API needed)
        run: pytest -q

      - name: Run AI generation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LOG_LEVEL: ${{ inputs.log_level }}
        run: python -m src.main

      - name: Upload generation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generation-output
          path: |
            output/
          if-no-files-found: warn
          retention-days: 14
