name: Manual Test (Salon Board Draft Post)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Salon Board mode"
        required: true
        default: "draft"
        type: choice
        options:
          - draft
          - schedule
      log_level:
        description: "Log level"
        required: false
        default: "INFO"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING

permissions:
  contents: read

jobs:
  draft-post:
    name: Generate + post as DRAFT (Phase 3)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install --with-deps chromium

      - name: Run unit tests (no API needed)
        run: pytest -q

      - name: Run generation + Salon Board (${{ inputs.mode }})
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SALON_BOARD_ID: ${{ secrets.SALON_BOARD_ID }}
          SALON_BOARD_PASSWORD: ${{ secrets.SALON_BOARD_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_SALON_BOARD_POST: ${{ inputs.mode }}
          LOG_LEVEL: ${{ inputs.log_level }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python -m src.main

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: salonboard-draft-output
          path: |
            output/
            screenshots/
          if-no-files-found: warn
          retention-days: 14
